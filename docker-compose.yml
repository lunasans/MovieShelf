services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movieshelf-app
    restart: unless-stopped
    volumes:
      - .:/var/www:delegated
      - ./.docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - movieshelf-network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: movieshelf-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:delegated
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - movieshelf-network

  db:
    image: mariadb:10.11
    container_name: movieshelf-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-movieshelf}
      MARIADB_USER: ${DB_USERNAME:-movieshelf}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - movieshelf-db-data:/var/lib/mysql
    networks:
      - movieshelf-network

  redis:
    image: redis:alpine
    container_name: movieshelf-redis
    restart: unless-stopped
    networks:
      - movieshelf-network

networks:
  movieshelf-network:
    driver: bridge

volumes:
  movieshelf-db-data:
    driver: local
