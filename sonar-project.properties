sonar.projectKey=MovieShelf
sonar.organization=movieshelf

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=dvdprofiler.liste
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=app,config,database,public,resources,routes

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

sonar.exclusions=vendor/**,node_modules/**,storage/**,public/storage/**,resources/translations/**
sonar.php.exclusions=vendor/**

# Exclude refactored files from coverage requirement until tests are written
# sonar.coverage.exclusions=app/Http/Controllers/Admin/TmdbImportController.php,app/Http/Controllers/Admin/MovieController.php,app/Http/Controllers/Admin/SettingController.php,app/Http/Controllers/ActorController.php,app/Console/Commands/FindDuplicateMovies.php,app/Console/Commands/MergeDuplicateActors.php

# Test and Coverage Reports
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=report.xml

# CSS Analysis
# Allow Tailwind custom at-rules
sonar.css.customAtRules=tailwind,apply,variants,responsive,screen
